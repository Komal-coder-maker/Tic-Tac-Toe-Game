<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <title>Tic Tac Toe - Pro</title>
    <style>
        :root {
            --primary: #6366f1; --secondary: #a855f7; --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05); --text-main: #f8fafc;
            --x-color: #38bdf8; --o-color: #fb7185;
        }
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: radial-gradient(circle at top left, #1e293b, #0f172a); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; margin: 0; padding: 20px; color: var(--text-main); }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); padding: 25px; width: 100%; max-width: 400px; position: relative; }
        .name-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
        .input-group input { width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; outline: none; }
        .start-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; }
        .back-btn { background: rgba(255, 255, 255, 0.1); border: none; padding: 8px 16px; border-radius: 10px; color: #cbd5e1; font-size: 12px; cursor: pointer; margin-bottom: 15px; }
        .mode-bar { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 14px; }
        .mode-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #94a3b8; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .mode-btn.active { background: var(--primary); color: white; }
        .scoreboard { display: flex; gap: 15px; margin-bottom: 20px; }
        .score-card { flex: 1; background: rgba(255, 255, 255, 0.03); border-radius: 18px; padding: 12px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.05); }
        .board { position: relative; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; background: rgba(0, 0, 0, 0.2); padding: 12px; border-radius: 20px; margin-bottom: 20px; }
        .cell { aspect-ratio: 1; background: rgba(255, 255, 255, 0.05); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 800; cursor: pointer; z-index: 2; }
        .cell.X { color: var(--x-color); } .cell.O { color: var(--o-color); }
        .win-line { position: absolute; background: white; border-radius: 10px; z-index: 5; pointer-events: none; box-shadow: 0 0 15px white; transform-origin: 0 50%; height: 6px; }
        .turn-text { text-align: center; height: 50px; font-weight: 700; color: #fff; }
        .action-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        .action-btn { flex: 1; padding: 14px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; background: rgba(255, 255, 255, 0.1); color: white; }
        .note { font-size: 11px; color: #64748b; text-align: center; line-height: 1.5; background: rgba(0,0,0,0.1); padding: 10px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="name-screen" id="nameScreen">
    <div class="glass-card">
        <h1 style="text-align:center">Tic Tac Toe</h1>
        <div class="input-group"><label>Player 1 (X)</label><input type="text" id="p1Input" placeholder="Enter Name"></div>
        <div class="input-group"><label>Player 2 (O)</label><input type="text" id="p2Input" placeholder="Enter Name"></div>
        <button class="start-btn" id="startBtn">START BATTLE</button>
    </div>
</div>

<div class="glass-card" id="gameContainer" style="display:none">
    <button class="back-btn" id="backBtn">← BACK</button>
    <div class="mode-bar">
        <button class="mode-btn active" id="singleMode">Solo (AI)</button>
        <button class="mode-btn" id="doubleMode">Duo (Friends)</button>
    </div>
    <div class="scoreboard">
        <div class="score-card"><div id="dispP1">P1</div><div id="score1" style="font-size:24px">0</div></div>
        <div class="score-card"><div id="dispP2">P2</div><div id="score2" style="font-size:24px">0</div></div>
    </div>
    <div class="board" id="board"></div>
    <div class="turn-text" id="turnText"></div>
    <div class="action-buttons">
        <button class="action-btn" id="nextBtn">NEXT ROUND</button>
        <button class="action-btn" id="resetBtn" style="color:var(--o-color)">RESET ALL</button>
    </div>
    <div class="note">
        <b>NOTE:</b> In Solo mode, AI will play as player2. In Duo mode, both players take turns. 
    </div>
</div>

<script>
    let p1 = { name: "Player 1", score: 0 }, p2 = { name: "Player 2", score: 0 };
    let board = ["","","","","","","","",""], current = "X", active = true, mode = "single";

    const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    function checkWin() {
        for (let combo of wins) {
            const [a, b, c] = combo;
            if (board[a] !== "" && board[a] === board[b] && board[a] === board[c]) return combo;
        }
        return null;
    }

    function drawLine(indices) {
        const cells = document.querySelectorAll(".cell");
        const bRect = document.getElementById("board").getBoundingClientRect();
        const s = cells[indices[0]].getBoundingClientRect();
        const e = cells[indices[2]].getBoundingClientRect();
        const x1 = s.left + s.width/2 - bRect.left, y1 = s.top + s.height/2 - bRect.top;
        const x2 = e.left + e.width/2 - bRect.left, y2 = e.top + e.height/2 - bRect.top;
        const line = document.createElement("div");
        line.className = "win-line";
        line.style.width = Math.sqrt(Math.pow(x2-x1,2) + Math.pow(y2-y1,2)) + "px";
        line.style.left = x1 + "px"; line.style.top = y1 + "px";
        line.style.transform = `rotate(${Math.atan2(y2-y1, x2-x1)*180/Math.PI}deg)`;
        document.getElementById("board").appendChild(line);
    }

    function render() {
        const bDiv = document.getElementById("board");
        const line = bDiv.querySelector(".win-line");
        bDiv.innerHTML = ""; if(line) bDiv.appendChild(line);
        board.forEach((v, i) => {
            const c = document.createElement("div");
            c.className = `cell ${v}`; c.textContent = v;
            c.onclick = () => { if(active && board[i]==="" && !(mode==="single" && current==="O")) handleMove(i); };
            bDiv.appendChild(c);
        });
    }

    function handleMove(i) {
        board[i] = current; render();
        const w = checkWin();
        if(w) {
            active = false; drawLine(w);
            let winnerName = "";
            if(current === "X") { p1.score++; winnerName = p1.name; }
            else { p2.score++; winnerName = (mode === "single" ? "AI" : p2.name); }
            document.getElementById("score1").innerText = p1.score;
            document.getElementById("score2").innerText = p2.score;
            document.getElementById("turnText").innerHTML = `<span style="color:#4ade80">${winnerName.toUpperCase()} WINS!</span>`;
            return;
        }
        if(!board.includes("")) { active = false; document.getElementById("turnText").innerText = "IT'S A DRAW!"; return; }
        current = current === "X" ? "O" : "X";
        updateTurnDisplay();
        if(mode === "single" && current === "O") setTimeout(ai, 600);
    }

    function updateTurnDisplay() {
        let nameToDisp = (current === "X") ? p1.name : (mode === "single" ? "AI" : p2.name);
        document.getElementById("turnText").innerText = `${nameToDisp.toUpperCase()}'S TURN`;
    }

    function ai() {
        const empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
        if(empty.length > 0) handleMove(empty[Math.floor(Math.random() * empty.length)]);
    }

    function resetGame() {
        board = ["","","","","","","","",""]; current = "X"; active = true;
        const oldLine = document.querySelector(".win-line");
        if (oldLine) oldLine.remove();
        updateTurnDisplay();
        render();
    }

    document.getElementById("startBtn").onclick = () => {
        p1.name = document.getElementById("p1Input").value || "Player 1";
        p2.name = document.getElementById("p2Input").value || "Player 2";
        document.getElementById("dispP1").innerText = p1.name;
        document.getElementById("dispP2").innerText = (mode === "single" ? "AI" : p2.name);
        document.getElementById("nameScreen").style.display = "none";
        document.getElementById("gameContainer").style.display = "block";
        resetGame();
    };

    document.getElementById("backBtn").onclick = () => { document.getElementById("nameScreen").style.display = "flex"; document.getElementById("gameContainer").style.display = "none"; };
    
    document.getElementById("singleMode").onclick = function() { 
        mode="single"; this.classList.add("active"); 
        document.getElementById("doubleMode").classList.remove("active");
        document.getElementById("dispP2").innerText = "AI";
        resetGame(); 
    };
    
    document.getElementById("doubleMode").onclick = function() { 
        mode="double"; this.classList.add("active"); 
        document.getElementById("singleMode").classList.remove("active");
        document.getElementById("dispP2").innerText = p2.name;
        resetGame(); 
    };

    document.getElementById("nextBtn").onclick = resetGame;
    document.getElementById("resetBtn").onclick = () => { p1.score=0; p2.score=0; document.getElementById("score1").innerText=0; document.getElementById("score2").innerText=0; resetGame(); };

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('service-worker.js'); }
</script>
</body>
</html>
