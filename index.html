<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tic Tac Toe - Compact Pro</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 15px;
        }

        /* Name Entry Screen */
        .name-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .name-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        .input-group {
            margin-bottom: 12px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 800;
            font-size: 13px;
            color: black;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }

        .start-btn {
            background: #007aff;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
        }

        /* Game Container */
        .game-container {
            width: 100%;
            max-width: 360px;
            display: none;
        }

        .game-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.1);
            position: relative;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: black;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            color: white;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.2s ease;
        }

        .back-btn:hover {
            background: #007aff;
            color: white;
            transform: scale(1.05);
        }

        .mode-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .mode-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid #eee;
            background: #fdfdfd;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }

        .mode-btn.active {
            background: #007aff;
            color: white;
            border-color: #007aff;
        }

        .scoreboard {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .score-card {
            flex: 1;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            border: 1px solid #f0f0f0;
        }

        .player-label {
            font-size: 9px;
            font-weight: 900;
            color: black;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .player-score {
            font-size: 24px;
            font-weight: 800;
        }

        /* BOARD */
        .board {
            position: relative;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: #f0f0f0;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .cell {
            aspect-ratio: 1;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            cursor: pointer;
            z-index: 2;
        }

        .cell.X { color: #007aff; }
        .cell.O { color: #ff3b30; }

        .win-line {
            position: absolute;
            background: #ffffff; 
            border-radius: 10px;
            z-index: 5;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .turn-text {
            text-align: center;
            padding: 10px;
            font-weight: 800;
            font-size: 15px;
            color: #444;
            min-height: 40px;
        }

        .symbol-x { color: #007aff; }
        .symbol-o { color: #ff3b30; }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            background: #e9e9eb;
        }

        .reset-btn { background: #ff3b30; color: white; }
    </style>
</head>
<body>

<div class="name-screen" id="nameScreen">
    <div class="name-card">
        <h2 style="margin-bottom: 20px;">✖️ Tic Tac Toe 🅾️</h2>
        <div class="input-group">
            <label>Player 1 (X)</label>
            <input type="text" id="p1Input" placeholder="Name">
        </div>
        <div class="input-group">
            <label>Player 2 (O)</label>
            <input type="text" id="p2Input" placeholder="Name">
        </div>
        <button class="start-btn" id="startBtn">START GAME</button>
        <p style="font-size: 14px; color: black; margin-top: 15px; font-weight: 900;">Note: Playing alone? AI will be Player 2.</p>
    </div>
</div>

<div class="game-container" id="gameContainer">
    <div class="game-card">
        <button class="back-btn" id="backBtn">← BACK TO Change Name</button>

        <div class="mode-bar">
            <button class="mode-btn active" id="singleMode">1 Player</button>
            <button class="mode-btn" id="doubleMode">2 Players</button>
        </div>

        <div class="scoreboard">
            <div class="score-card">
                <div id="p1NameLabel" class="player-label">PLAYER 1</div>
                <div class="player-score" id="score1">0</div>
            </div>
            <div class="score-card">
                <div id="p2NameLabel" class="player-label">PLAYER 2</div>
                <div class="player-score" id="score2">0</div>
            </div>
        </div>

        <div class="board" id="board"></div>

        <div class="turn-text" id="turnText"></div>

        <div class="action-buttons">
            <button class="action-btn" id="newGame">NEXT ROUND</button>
            <button class="action-btn reset-btn" id="resetScore">RESET</button>
        </div>
    </div>
</div>

<script>
    let player1 = { name: "Player 1", score: 0 };
    let player2 = { name: "Player 2", score: 0 };
    let mode = "single";
    let board = ["", "", "", "", "", "", "", "", ""];
    let current = "X";
    let active = true;

    const boardDiv = document.getElementById("board");
    const turnText = document.getElementById("turnText");

    const wins = [
        { indices: [0, 1, 2], type: 'h', pos: 0 },
        { indices: [3, 4, 5], type: 'h', pos: 1 },
        { indices: [6, 7, 8], type: 'h', pos: 2 },
        { indices: [0, 3, 6], type: 'v', pos: 0 },
        { indices: [1, 4, 7], type: 'v', pos: 1 },
        { indices: [2, 5, 8], type: 'v', pos: 2 },
        { indices: [0, 4, 8], type: 'd', dir: 'main' },
        { indices: [2, 4, 6], type: 'd', dir: 'anti' }
    ];

    function drawLine(pattern) {
        const line = document.createElement("div");
        line.className = "win-line";
        const thickness = 6;
        if (pattern.type === 'h') {
            line.style.width = "90%";
            line.style.height = `${thickness}px`;
            line.style.top = `calc(${(pattern.pos * 33.33) + 16.66}% - ${thickness/2}px)`;
            line.style.left = "5%";
        } else if (pattern.type === 'v') {
            line.style.width = `${thickness}px`;
            line.style.height = "90%";
            line.style.left = `calc(${(pattern.pos * 33.33) + 16.66}% - ${thickness/2}px)`;
            line.style.top = "5%";
        } else if (pattern.type === 'd') {
            line.style.width = "110%";
            line.style.height = `${thickness}px`;
            line.style.top = "50%";
            line.style.left = "-5%";
            line.style.transform = `translateY(-50%) rotate(${pattern.dir === 'main' ? '45deg' : '-45deg'})`;
        }
        boardDiv.appendChild(line);
    }

    function renderBoard() {
        boardDiv.innerHTML = "";
        board.forEach((val, i) => {
            const cell = document.createElement("div");
            cell.className = `cell ${val}`;
            cell.textContent = val;
            cell.onclick = () => {
                if (active && board[i] === "" && !(mode === "single" && current === "O")) {
                    makeMove(i);
                }
            };
            boardDiv.appendChild(cell);
        });
    }

    function makeMove(i) {
        board[i] = current;
        renderBoard();
        const win = checkWin();
        if (win) {
            active = false;
            drawLine(win.pattern);
            if (current === "X") player1.score++; else player2.score++;
            updateUI();
            const winnerName = current === "X" ? player1.name : (mode === "single" ? "AI" : player2.name);
            turnText.innerHTML = `${winnerName.toUpperCase()} <span class="symbol-${current.toLowerCase()}">(${current})</span> WINS! 🎉`;
            return;
        }
        if (!board.includes("")) {
            active = false;
            turnText.innerText = "DRAW! 🤝";
            return;
        }
        current = current === "X" ? "O" : "X";
        updateTurn();
        if (mode === "single" && current === "O" && active) setTimeout(aiMove, 600);
    }

    function aiMove() {
        const empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
        const random = empty[Math.floor(Math.random() * empty.length)];
        if (random !== undefined) makeMove(random);
    }

    function checkWin() {
        for (let w of wins) {
            const [a, b, c] = w.indices;
            if (board[a] && board[a] === board[b] && board[a] === board[c]) return { symbol: board[a], pattern: w };
        }
        return null;
    }

    function updateTurn() {
        const name = current === "X" ? player1.name : (mode === "single" ? "AI" : player2.name);
        // Added symbol in bracket with color coding
        turnText.innerHTML = `${name.toUpperCase()} <span class="symbol-${current.toLowerCase()}">(${current})</span>'S TURN`;
    }

    function updateUI() {
        document.getElementById("score1").innerText = player1.score;
        document.getElementById("score2").innerText = player2.score;
    }

    function resetRound() {
        board = ["", "", "", "", "", "", "", "", ""];
        current = "X";
        active = true;
        renderBoard();
        updateTurn();
    }

    document.getElementById("startBtn").onclick = () => {
        player1.name = document.getElementById("p1Input").value || "Player 1";
        player2.name = document.getElementById("p2Input").value || "Player 2";
        document.getElementById("p1NameLabel").innerText = player1.name.toUpperCase();
        document.getElementById("p2NameLabel").innerText = mode === "single" ? "AI" : player2.name.toUpperCase();
        document.getElementById("nameScreen").style.display = "none";
        document.getElementById("gameContainer").style.display = "block";
        resetRound();
    };

    document.getElementById("backBtn").onclick = () => {
        document.getElementById("nameScreen").style.display = "flex";
        document.getElementById("gameContainer").style.display = "none";
    };

    document.getElementById("singleMode").onclick = function() {
        mode = "single";
        this.classList.add("active");
        document.getElementById("doubleMode").classList.remove("active");
        document.getElementById("p2NameLabel").innerText = "AI";
        resetRound();
    };

    document.getElementById("doubleMode").onclick = function() {
        mode = "double";
        this.classList.add("active");
        document.getElementById("singleMode").classList.remove("active");
        document.getElementById("p2NameLabel").innerText = player2.name.toUpperCase();
        resetRound();
    };

    document.getElementById("newGame").onclick = resetRound;
    document.getElementById("resetScore").onclick = () => {
        player1.score = 0; player2.score = 0; updateUI(); resetRound();
    };

    resetRound();
</script>
</body>
</html>
